<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Catalog</title>
    <!-- Include the HTML5-QRCode scanner library via CDN -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 { text-align: center; }
        .scanner-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
        }
        .manual-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        input, button {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .stats {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .book-card img {
            max-width: 120px;
            height: 170px;
            object-fit: cover;
            background: #e0e0e0;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .book-title { font-weight: bold; font-size: 14px; margin: 5px 0; }
        .book-author { color: #666; font-size: 13px; }
    </style>
</head>
<body>

    <h1>📚 Personal Book Catalog</h1>
    
    <!-- Scanner & Manual Lookup Section -->
    <div class="scanner-section">
        <div id="reader"></div>
        <div class="manual-input">
            <input type="text" id="isbn-input" placeholder="Enter ISBN manually...">
            <button onclick="lookupManualISBN()">Lookup</button>
        </div>
    </div>

    <!-- Catalog View Section -->
    <h2>My Library</h2>
    <div class="stats" id="book-count">Total Books: 0</div>
    <div class="book-grid" id="catalog-grid"></div>

    <script>
        let library = JSON.parse(localStorage.getItem('my_book_catalog')) || [];

        // Initialize the Barcode Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 150 }, // Aspect ratio optimized for long barcodes
            formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13 ] // standard book barcodes
        });
        
        html5QrcodeScanner.render(onScanSuccess);

        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanning temporarily to avoid duplicate hits
            html5QrcodeScanner.clear();
            fetchBookData(decodedText);
        }

        function lookupManualISBN() {
            const isbn = document.getElementById('isbn-input').value.trim();
            if (isbn) fetchBookData(isbn);
        }

        // Fetch book metadata from Open Library API
        function fetchBookData(isbn) {
            // Clean up the ISBN string
            const cleanIsbn = isbn.replace(/[- ]/g, "");
            
            // Check if book already exists in catalog
            if (library.some(book => book.isbn === cleanIsbn)) {
                alert("This book is already in your catalog!");
                resetScanner();
                return;
            }

            const apiUrl = `https://openlibrary.org/api/books?bibkeys=ISBN:${cleanIsbn}&jscmd=data&format=json`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const bookKey = `ISBN:${cleanIsbn}`;
                    if (data && data[bookKey]) {
                        const bookInfo = data[bookKey];
                        
                        const newBook = {
                            isbn: cleanIsbn,
                            title: bookInfo.title || "Unknown Title",
                            author: bookInfo.authors ? bookInfo.authors[0].name : "Unknown Author",
                            cover: bookInfo.cover ? bookInfo.cover.medium : ""
                        };

                        library.push(newBook);
                        saveLibrary();
                        renderLibrary();
                    } else {
                        alert("Book not found in Open Library database. You can try manual entry later.");
                    }
                    resetScanner();
                })
                .catch(err => {
                    console.error("API Error: ", err);
                    alert("Error fetching book data.");
                    resetScanner();
                });
        }

        function resetScanner() {
            document.getElementById('isbn-input').value = "";
            // Restart the scanner camera loop
            html5QrcodeScanner.render(onScanSuccess);
        }

        function saveLibrary() {
            localStorage.setItem('my_book_catalog', JSON.stringify(library));
        }

        function renderLibrary() {
            const grid = document.getElementById('catalog-grid');
            const countLabel = document.getElementById('book-count');
            grid.innerHTML = "";
            countLabel.innerText = `Total Books: ${library.length}`;

            // Render books starting with the newest additions
            library.slice().reverse().forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                const coverImg = book.cover ? book.cover : 'https://via.placeholder.com/120x170?text=No+Cover';
                
                card.innerHTML = `
                    <img src="${coverImg}" alt="${book.title}">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Initial render on page load
        renderLibrary();
    </script>
</body>
</html>
